<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sequoias">
  <defs>
    <linearGradient id="seq-trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A06441"/>
      <stop offset="1" stop-color="#6B3A24"/>
    </linearGradient>
    <linearGradient id="seq-canopy-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C8463"/>
      <stop offset="1" stop-color="#3F5E45"/>
    </linearGradient>
    <linearGradient id="seq-canopy-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#557F5C"/>
      <stop offset="1" stop-color="#385640"/>
    </linearGradient>
    <linearGradient id="seq-canopy-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4D7755"/>
      <stop offset="1" stop-color="#314D38"/>
    </linearGradient>
    <linearGradient id="seq-canopy-4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#456E4D"/>
      <stop offset="1" stop-color="#2A4632"/>
    </linearGradient>
  </defs>

  <!-- trunk -->
  <path d="M 232 308 Q 226 360 218 412 Q 212 440 200 446 L 312 446 Q 300 440 294 412 Q 286 360 280 308 Z"
        fill="url(#seq-trunk)"/>

  <!-- canopy clusters, narrowing toward apex -->
  <path d="M 256 300 Q 168 296 156 350 Q 152 384 184 388 Q 220 392 256 388 Q 292 392 328 388 Q 360 384 356 350 Q 344 296 256 300 Z"
        fill="url(#seq-canopy-1)"/>
  <path d="M 256 220 Q 184 218 174 264 Q 172 294 196 300 Q 224 304 256 302 Q 288 304 316 300 Q 340 294 338 264 Q 328 218 256 220 Z"
        fill="url(#seq-canopy-2)"/>
  <path d="M 256 148 Q 198 148 190 188 Q 188 214 208 220 Q 230 224 256 222 Q 282 224 304 220 Q 324 214 322 188 Q 314 148 256 148 Z"
        fill="url(#seq-canopy-3)"/>
  <path d="M 256 86 Q 222 86 218 122 Q 218 144 234 152 Q 244 156 256 154 Q 268 156 278 152 Q 294 144 294 122 Q 290 86 256 86 Z"
        fill="url(#seq-canopy-4)"/>

  <!-- subtle highlights -->
  <path d="M 230 232 Q 244 224 268 226" stroke="#7AA081" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M 224 312 Q 244 304 274 306" stroke="#7DA582" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
